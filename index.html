<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Trading Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: #fff;
}

.container { display: flex; }

/* LEFT */
.sidebar {
    width: 300px;
    background: #111827;
    padding: 20px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
}

input {
    background: #020617;
    color: #fff;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}

/* RIGHT */
.main {
    flex: 1;
    padding: 20px;
    display: none;
    position: relative;
}

.grid-area {
    height: 600px;
    position: relative;
    border-left: 2px solid #fff;
}

/* เส้น grid */
.grid-line {
    position: absolute;
    width: 100%;
    border-top: 1px dashed #22c55e;
}

/* buy text */
.buy {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #facc15;
    font-size: 13px;
}

/* หมายเลขไม้ */
.order-label {
    position: absolute;
    left: 10px;
    color: #22c55e;
    font-size: 12px;
}

/* label บนล่าง */
.label {
    position: absolute;
    right: 10px;
    display: none;
}

.top-label { top: 0; color: red; }
.bottom-label { bottom: 0; color: green; }

/* กล่องหลักการ */
.info-box {
    position: absolute;
    left: 20px;
    bottom: 20px;
    background: #1e1b4b;
    padding: 15px;
    border-radius: 10px;
    width: 240px;
    font-size: 14px;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    background: #020617;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>📊 Grid Calculator</h2>

<select id="type">
<option value="standard">Standard</option>
<option value="micro">Micro</option>
</select>

<input id="balance" placeholder="Balance (ex.10000)">
<input id="upper" placeholder="กรอบบน (ex.5000)">
<input id="lower" placeholder="กรอบล่าง (ex.4000)">
<input id="grid" placeholder="ระยะกริด (ex.30)">

<div style="display:flex; gap:5px;">
<button onclick="changeLot(-0.01)">-</button>
<input id="lot" placeholder="Lot (ex.0.01)">
<button onclick="changeLot(0.01)">+</button>
</div>

<button onclick="run()">คำนวณ</button>
<button onclick="findOptimal()">🔥 Grid Optimal</button>
<button onclick="resetAll()">🔄 Reset</button>

<div class="result-box" id="result"></div>
</div>

<div class="main" id="main">

<h2>Grid Visualization</h2>

<div class="grid-area" id="gridArea">

<div class="label top-label" id="topLabel"></div>
<div class="label bottom-label" id="bottomLabel"></div>

<!-- 💬 หลักการ -->
<div class="info-box">
<b>หลักการทำงาน</b><br><br>
📉 ราคาลง → เปิด Buy เพิ่ม<br>
📈 ราคาขึ้น → ปิดกำไร<br>
💰 กำไรทีละช่อง (Grid)<br><br>
⚠️ หากราคาหลุดโซน → DD สูง
</div>

</div>

</div>
</div>

<script>

// lot step
function changeLot(step){
let v=parseFloat(lot.value)||0;
v+=step;
if(v<0)v=0;
lot.value=v.toFixed(2);
}

// calc
function calcDD(u,l,g,p){
let orders=Math.floor((u-l)/g)+1;
let total=0;
for(let i=0;i<orders;i++){
total+=i*g*p;
}
return {total,orders};
}

// run
function run(){

if(!upper.value||!lower.value||!grid.value||!lot.value){
alert("กรุณากรอก: กรอบราคาบน ,กรอบราคาล่าง,ระยะ grid,lotsize");
return;
}

main.style.display="block";

let u=+upper.value;
let l=+lower.value;
let g=+grid.value;
let lotv=+lot.value;
let per=(type.value==="micro")?(lotv*100)/100:(lotv*100);

let {total,orders}=calcDD(u,l,g,per);

result.innerHTML=`
📌 ${orders} ไม้<br>
📦 Lotsize: ${lotv}<br>
📏 ระยะGrid: ${g}<br>
💰 กำไร/ช่อง: ${(g*per).toFixed(2)}<br>
🔻 DrawDown: ${total.toFixed(2)}<br>
💵 ใช้เงิน: ${total.toFixed(2)}
`;

drawGrid(u,l,g);
}

// optimal
function findOptimal(){

if(!upper.value||!lower.value||!lot.value||!balance.value){
alert("กรุณากรอก: balance,lotsize,กรอบราคาบน,กรอบราคาล่าง");
return;
}

main.style.display="block";

let u=+upper.value;
let l=+lower.value;
let lotv=+lot.value;
let bal=+balance.value;

let per=(type.value==="micro")?(lotv*100)/100:(lotv*100);

let best=null;
let bestDD=0;
let min=Infinity;

for(let g=10;g<=200;g+=5){
let {total}=calcDD(u,l,g,per);

if(total<min)min=total;

if(total<=bal && total>bestDD){
bestDD=total;
best=g;
}
}

if(best){
grid.value=best;
run();
}else{
result.innerHTML=`
❗ เงินไม่พอ<br>
💡 ต้องมีอย่างน้อย:<br>
${min.toFixed(2)} USD
`;
}
}

// draw grid
function drawGrid(u,l,g){

document.querySelectorAll(".grid-line,.buy,.order-label").forEach(e=>e.remove());

let h=600;
let r=u-l;
let index=1;

for(let p=l;p<=u;p+=g){

let y=h-((p-l)/r)*h;

// เส้น
let line=document.createElement("div");
line.className="grid-line";
line.style.top=y+"px";

// buy text
let buy=document.createElement("div");
buy.className="buy";
buy.style.top=y+"px";
buy.innerHTML="buy";

// ลำดับไม้
let label=document.createElement("div");
label.className="order-label";
label.style.top=y+"px";
label.innerHTML="ไม้ " + index;

gridArea.appendChild(line);
gridArea.appendChild(buy);
gridArea.appendChild(label);

index++;
}

// label บนล่าง
topLabel.style.display="block";
bottomLabel.style.display="block";

topLabel.innerHTML="บน " + u;
bottomLabel.innerHTML="ล่าง " + l;
}

// reset
function resetAll(){

document.querySelectorAll("input").forEach(i=>i.value="");

result.innerHTML="";
main.style.display="none";

document.querySelectorAll(".grid-line,.buy,.order-label").forEach(e=>e.remove());

topLabel.style.display="none";
bottomLabel.style.display="none";
}

</script>

</body>
</html>
