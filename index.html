<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Trading Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: #fff;
}

.container { display: flex; }

/* LEFT PANEL */
.sidebar {
    width: 300px;
    background: #111827;
    padding: 20px;
    border-right: 1px solid #333;
}

.sidebar h2 { color: #4ade80; }

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
}

input {
    background: #020617;
    color: #fff;
}

input::placeholder { color: #777; }

button {
    background: #22c55e;
    color: #fff;
    cursor: pointer;
}

.result-box {
    margin-top: 20px;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #333;
}

/* MAIN */
.main { flex: 1; padding: 20px; position: relative; }

.grid-area {
    position: relative;
    height: 600px;
    border-left: 2px solid #fff;
}

.grid-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed #22c55e;
}

.buy {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #facc15;
}

.label {
    position: absolute;
    right: 10px;
    font-size: 14px;
    display: none;
}

.top-label { color: red; top: 0; }
.bottom-label { color: #22c55e; bottom: 0; }

.info {
    position: absolute;
    left: 20px;
    bottom: 20px;
    background: #1e1b4b;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
}

.warning {
    margin-top: 15px;
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #38bdf8;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="sidebar">
    <h2>📊 Grid Calculator</h2>

    <label>ประเภทพอร์ต</label>
    <select id="type">
        <option value="standard">Standard</option>
        <option value="micro">Micro</option>
    </select>

    <label>Balance</label>
    <input type="number" id="balance" placeholder="ex. 10000">

    <label>กรอบบน</label>
    <input type="number" id="upper" placeholder="ex. 5000">

    <label>กรอบล่าง</label>
    <input type="number" id="lower" placeholder="ex. 4000">

    <label>ระยะกริด</label>
    <input type="number" id="grid" placeholder="ex. 30">

    <label>Lot Size</label>
    <div style="display:flex; gap:5px;">
        <button onclick="changeLot(-0.01)">-</button>
        <input type="number" id="lot" placeholder="ex. 0.01" step="0.01">
        <button onclick="changeLot(0.01)">+</button>
    </div>

    <button onclick="run()">คำนวณ</button>
    <button onclick="findOptimal()">🔥 หา Grid Optimal</button>

    <div class="result-box" id="result"></div>
</div>

<!-- MAIN -->
<div class="main">

<h2 style="color:#facc15;">Grid Visualization</h2>

<div class="grid-area" id="gridArea">
    <div class="label top-label" id="topLabel"></div>
    <div class="label bottom-label" id="bottomLabel"></div>

    <div class="info">
        <b>หลักการทำงาน</b><br><br>
        ราคาลง → Buy<br>
        ราคาขึ้น → ปิดกำไร<br>
        กำไรทีละช่อง
    </div>
</div>

<div class="warning">
ระบบจะพยายามหา grid ที่ใช้เงินคุ้มสุดโดยไม่ล้างพอร์ต
</div>

</div>
</div>

<script>

// ➕➖ ปรับ lot
function changeLot(step) {
    let input = document.getElementById("lot");
    let value = parseFloat(input.value) || 0;
    value += step;
    if (value < 0) value = 0;
    input.value = value.toFixed(2);
}

// คำนวณ DD
function calcDD(upper, lower, grid, perPoint) {
    let range = upper - lower;
    let orders = Math.floor(range / grid) + 1;
    let total = 0;

    for (let i = 0; i < orders; i++) {
        total += i * grid * perPoint;
    }
    return { total, orders };
}

function run() {

    let upper = +upperInput.value;
    let lower = +lowerInput.value;
    let grid = +gridInput.value;
    let lot = +lotInput.value;
    let type = typeInput.value;

    if (!upper || !lower || !grid || !lot) {
        alert("กรอกข้อมูลให้ครบ");
        return;
    }

    let perPoint = (type === "micro") ? (lot * 100)/100 : (lot * 100);

    let { total, orders } = calcDD(upper, lower, grid, perPoint);

    let profitPerGrid = grid * perPoint;

    result.innerHTML = `
        📌 จำนวนไม้: ${orders}<br>
        📦 Lot Size: ${lot}<br>
        📏 ระยะกริด: ${grid}<br>
        💰 กำไรต่อช่อง: ${profitPerGrid.toFixed(2)} USD<br>
        💰 $/point: ${perPoint.toFixed(2)}<br>
        🔻 DD สูงสุด: ${total.toFixed(2)} USD<br><br>
        💵 <b>จำนวนเงินที่ต้องใช้:</b><br>
        ${total.toFixed(2)} USD
    `;

    topLabel.style.display = "block";
    bottomLabel.style.display = "block";
    topLabel.innerHTML = "กรอบบน " + upper;
    bottomLabel.innerHTML = "กรอบล่าง " + lower;

    drawGrid(upper, lower, grid);
}

// หา grid optimal
function findOptimal() {

    let upper = +upperInput.value;
    let lower = +lowerInput.value;
    let lot = +lotInput.value;
    let balance = +balanceInput.value;
    let type = typeInput.value;

    if (!upper || !lower || !lot || !balance) {
        alert("กรอกข้อมูลให้ครบ");
        return;
    }

    let perPoint = (type === "micro") ? (lot * 100)/100 : (lot * 100);

    let bestGrid = null;
    let bestDD = 0;

    for (let g = 10; g <= 200; g += 5) {
        let { total } = calcDD(upper, lower, g, perPoint);

        if (total <= balance && total > bestDD) {
            bestDD = total;
            bestGrid = g;
        }
    }

    if (bestGrid) {
        gridInput.value = bestGrid;
        run();
    } else {
        alert("Balance ไม่พอ");
    }
}

// วาด grid
function drawGrid(upper, lower, grid) {

    document.querySelectorAll(".grid-line, .buy").forEach(e => e.remove());

    let height = 600;
    let range = upper - lower;

    for (let price = lower; price <= upper; price += grid) {

        let y = height - ((price - lower) / range) * height;

        let line = document.createElement("div");
        line.className = "grid-line";
        line.style.top = y + "px";

        let buy = document.createElement("div");
        buy.className = "buy";
        buy.style.top = y + "px";
        buy.innerHTML = "● Buy";

        gridArea.appendChild(line);
        gridArea.appendChild(buy);
    }
}

// shorthand
let upperInput = document.getElementById("upper");
let lowerInput = document.getElementById("lower");
let gridInput = document.getElementById("grid");
let lotInput = document.getElementById("lot");
let typeInput = document.getElementById("type");
let balanceInput = document.getElementById("balance");
let result = document.getElementById("result");
let gridArea = document.getElementById("gridArea");
let topLabel = document.getElementById("topLabel");
let bottomLabel = document.getElementById("bottomLabel");

</script>

</body>
</html>
